<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <form class="main-form" id="passwordForm">
          <!-- password display area -->
          <div class="input-container">
            <div class="password-field">
              <input
                type="text"
                id="passwordInput"
                placeholder="Your secure password"
                readonly
                value="P@ssw0rd!24"
              />
              <button type="button" class="copy-btn" id="copyButton">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"
                    fill="currentColor"
                  />
                </svg>
                Copy
              </button>
            </div>
            <div class="strength-wrapper">
              <div class="strength-bars" id="strengthBars">
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
              </div>
              <div class="strength-label" id="strengthLabel">MEDIUM</div>
            </div>
            <div id="copyToast" class="copy-toast">Copied!</div>
          </div>

          <div class="options-container">
            <!-- length slider -->
            <div class="option-group">
              <div class="length-control">
                <span>🔐 Length</span>
                <span id="lengthValue">14</span>
              </div>
              <input
                type="range"
                id="lengthSlider"
                min="6"
                max="32"
                value="14"
                step="1"
              />
            </div>

            <!-- character sets -->
            <div class="checkboxes-grid" id="checkboxesGroup">
              <div class="checkbox-item">
                <input type="checkbox" id="uppercase" checked />
                <label for="uppercase">A-Z (Uppercase)</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="lowercase" checked />
                <label for="lowercase">a-z (Lowercase)</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="numbers" checked />
                <label for="numbers">0-9 (Digits)</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="symbols" checked />
                <label for="symbols">!@#$%^&* (Symbols)</label>
              </div>
            </div>
          </div>
          <div class="gen-btn-wrapper">
            <button type="button" id="generateBtn">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M17.65 6.35C16.2 4.9 14.21 4 12 4C7.58 4 4.01 7.58 4.01 12C4.01 16.42 7.58 20 12 20C15.73 20 18.84 17.45 19.73 14H17.65C16.83 16.33 14.61 18 12 18C8.69 18 6 15.31 6 12C6 8.69 8.69 6 12 6C13.66 6 15.14 6.69 16.22 7.78L13 11H20V4L17.65 6.35Z"
                  fill="white"
                />
              </svg>
              Generate my password
            </button>
          </div>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
